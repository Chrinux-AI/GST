<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Peace & Conflict Studies — CBT Practice</title>
<style>
  :root{
    --bg:#0f1420; --card:#171e2e; --card2:#1e2740; --accent:#5b8def; --accent2:#7c5cff;
    --good:#2ecc71; --bad:#ff5566; --text:#eef1f8; --muted:#93a0bd; --border:#2a3350;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#0f1420,#141b2c 60%,#10162a);
    color:var(--text); min-height:100vh; padding-bottom:40px;
  }
  header{
    padding:18px 16px 14px; text-align:center; position:sticky; top:0; z-index:20;
    background:rgba(15,20,32,0.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--border);
  }
  header h1{font-size:1.05rem; margin:0 0 2px; font-weight:700; letter-spacing:.2px;}
  header p{margin:0; font-size:.75rem; color:var(--muted);}
  .container{max-width:640px; margin:0 auto; padding:14px;}
  .tabs{display:flex; gap:8px; margin:14px auto; max-width:640px; padding:0 14px;}
  .tab{
    flex:1; padding:10px; text-align:center; border-radius:12px; background:var(--card);
    border:1px solid var(--border); color:var(--muted); font-weight:600; font-size:.85rem; cursor:pointer;
    transition:.15s;
  }
  .tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border-color:transparent;}

  .panel{display:none;}
  .panel.active{display:block;}

  .setup-card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; margin-bottom:14px;}
  .setup-card h2{margin:0 0 10px; font-size:1rem;}
  .chip-row{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;}
  .chip{
    padding:8px 12px; border-radius:20px; background:var(--card2); border:1px solid var(--border);
    font-size:.8rem; color:var(--muted); cursor:pointer; user-select:none;
  }
  .chip.selected{background:var(--accent); color:#fff; border-color:var(--accent);}
  .field-label{font-size:.75rem; color:var(--muted); margin:10px 0 6px; text-transform:uppercase; letter-spacing:.5px;}
  .count-row{display:flex; gap:8px; flex-wrap:wrap;}
  .count-btn{
    padding:8px 14px; border-radius:10px; background:var(--card2); border:1px solid var(--border);
    color:var(--muted); font-size:.8rem; cursor:pointer;
  }
  .count-btn.selected{background:var(--accent2); color:#fff; border-color:var(--accent2);}
  .start-btn{
    width:100%; padding:14px; border:none; border-radius:12px; margin-top:16px;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-size:.95rem;
    font-weight:700; cursor:pointer;
  }
  .start-btn:active{transform:scale(.98);}
  .stat-mini{font-size:.72rem; color:var(--muted); text-align:center; margin-top:6px;}

  /* Quiz view */
  .quiz-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-size:.78rem; color:var(--muted);}
  .progress-bar{height:6px; background:var(--card2); border-radius:6px; overflow:hidden; margin-bottom:16px;}
  .progress-fill{height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .25s;}
  .q-card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:14px;}
  .q-chapter{font-size:.68rem; color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:.6px; margin-bottom:8px;}
  .q-text{font-size:1.02rem; line-height:1.45; font-weight:600;}
  .opt{
    display:block; width:100%; text-align:left; padding:13px 14px; margin-top:10px; border-radius:12px;
    background:var(--card2); border:1px solid var(--border); color:var(--text); font-size:.9rem; cursor:pointer;
    line-height:1.35;
  }
  .opt .letter{display:inline-block; width:22px; height:22px; border-radius:50%; background:var(--border); color:var(--muted);
    text-align:center; line-height:22px; font-size:.72rem; margin-right:8px; font-weight:700;}
  .opt.correct{background:rgba(46,204,113,.16); border-color:var(--good);}
  .opt.correct .letter{background:var(--good); color:#08210f;}
  .opt.wrong{background:rgba(255,85,102,.16); border-color:var(--bad);}
  .opt.wrong .letter{background:var(--bad); color:#2a0508;}
  .opt.disabled{pointer-events:none;}
  .explain{
    margin-top:12px; padding:12px 14px; border-radius:12px; background:var(--card2); border:1px solid var(--border);
    font-size:.82rem; color:var(--muted); display:none; line-height:1.4;
  }
  .explain.show{display:block;}
  .nav-row{display:flex; gap:10px; margin-top:14px;}
  .nav-btn{
    flex:1; padding:13px; border-radius:12px; border:1px solid var(--border); background:var(--card2);
    color:var(--text); font-weight:600; font-size:.88rem; cursor:pointer;
  }
  .nav-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; color:#fff;}
  .nav-btn:disabled{opacity:.4; pointer-events:none;}

  /* Results */
  .result-card{background:var(--card); border:1px solid var(--border); border-radius:18px; padding:26px 20px; text-align:center;}
  .score-ring{font-size:2.6rem; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .result-card p{color:var(--muted); font-size:.85rem;}
  .breakdown{text-align:left; margin-top:16px;}
  .bd-row{display:flex; justify-content:space-between; font-size:.82rem; padding:8px 0; border-bottom:1px solid var(--border);}
  .bd-row span:last-child{color:var(--muted);}

  /* Flashcards */
  .fc-wrap{display:flex; flex-direction:column; align-items:center;}
  .fc-counter{font-size:.78rem; color:var(--muted); margin-bottom:10px;}
  .flashcard{
    width:100%; max-width:560px; min-height:230px; perspective:1200px; margin-bottom:16px; cursor:pointer;
  }
  .flashcard-inner{
    position:relative; width:100%; height:100%; min-height:230px; transition:transform .5s; transform-style:preserve-3d;
  }
  .flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
  .fc-face{
    position:absolute; width:100%; height:100%; min-height:230px; backface-visibility:hidden;
    border-radius:18px; padding:22px; display:flex; flex-direction:column; justify-content:center;
    border:1px solid var(--border);
  }
  .fc-front{background:var(--card);}
  .fc-back{background:var(--card2); transform:rotateY(180deg);}
  .fc-tag{font-size:.66rem; color:var(--accent); text-transform:uppercase; font-weight:700; letter-spacing:.6px; margin-bottom:10px;}
  .fc-q{font-size:1rem; font-weight:600; line-height:1.4;}
  .fc-hint{margin-top:14px; font-size:.72rem; color:var(--muted);}
  .fc-a{font-size:1rem; font-weight:700; color:var(--good); margin-bottom:8px; line-height:1.4;}
  .fc-exp{font-size:.85rem; color:var(--muted); line-height:1.4;}
  .fc-controls{display:flex; gap:10px; width:100%; max-width:560px;}

  .empty-msg{text-align:center; color:var(--muted); padding:30px 10px; font-size:.88rem;}
</style>
</head>
<body>

<header>
  <h1>Peace & Conflict Studies</h1>
  <p>CBT Practice Bank · 221 Questions</p>
</header>

<div class="tabs">
  <div class="tab active" data-tab="cbt">CBT Mode</div>
  <div class="tab" data-tab="flash">Flashcards</div>
</div>

<div class="container">

  <!-- CBT PANEL -->
  <div class="panel active" id="panel-cbt">

    <div id="cbt-setup">
      <div class="setup-card">
        <h2>Choose chapters</h2>
        <div class="chip-row" id="chapterChips"></div>

        <div class="field-label">Number of questions</div>
        <div class="count-row" id="countRow"></div>

        <button class="start-btn" id="startCbtBtn">Start CBT Practice</button>
        <div class="stat-mini" id="poolInfo"></div>
      </div>
    </div>

    <div id="cbt-quiz" style="display:none;">
      <div class="quiz-header">
        <span id="qCounter">Q1 / 20</span>
        <span id="qScore">Score: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

      <div class="q-card">
        <div class="q-chapter" id="qChapter">CHAPTER 1</div>
        <div class="q-text" id="qText"></div>
        <div id="optsWrap"></div>
        <div class="explain" id="explainBox"></div>
      </div>

      <div class="nav-row">
        <button class="nav-btn" id="skipBtn">Skip</button>
        <button class="nav-btn primary" id="nextBtn" disabled>Next</button>
      </div>
    </div>

    <div id="cbt-result" style="display:none;">
      <div class="result-card">
        <div class="score-ring" id="scoreRing">0%</div>
        <p id="scoreSub">You got 0 of 0 correct</p>
        <div class="breakdown" id="chapterBreakdown"></div>
        <button class="start-btn" id="retryBtn" style="margin-top:18px;">Practice Again</button>
      </div>
    </div>
  </div>

  <!-- FLASHCARD PANEL -->
  <div class="panel" id="panel-flash">
    <div class="setup-card">
      <h2>Flashcard chapters</h2>
      <div class="chip-row" id="fcChapterChips"></div>
      <button class="start-btn" id="startFcBtn">Start Flashcards</button>
    </div>

    <div id="fc-area" style="display:none;">
      <div class="fc-wrap">
        <div class="fc-counter" id="fcCounter">Card 1 / 20</div>
        <div class="flashcard" id="flashcard">
          <div class="flashcard-inner">
            <div class="fc-face fc-front">
              <div class="fc-tag" id="fcTagFront">CHAPTER 1</div>
              <div class="fc-q" id="fcQFront"></div>
              <div class="fc-hint">Tap card to reveal answer</div>
            </div>
            <div class="fc-face fc-back">
              <div class="fc-tag" id="fcTagBack">ANSWER</div>
              <div class="fc-a" id="fcAback"></div>
              <div class="fc-exp" id="fcExpBack"></div>
            </div>
          </div>
        </div>
        <div class="fc-controls">
          <button class="nav-btn" id="fcPrevBtn">◀ Prev</button>
          <button class="nav-btn primary" id="fcNextBtn">Next ▶</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const DATA = [{"ch": 1, "q": "According to Jeong (2021), conflict refers to a situation where two or more parties perceive what?", "opts": ["Equal power", "Shared resources", "Historical ties", "Incompatible goals"], "ans": 3, "exp": "Jeong (2021) defines conflict as a situation where two or more parties perceive incompatible goals."}, {"ch": 1, "q": "Best (2014) describes peace, from a sociological perspective, as a situation where:", "opts": ["Wealth is equally distributed", "Religion controls the state", "There is no societal conflict and needs/expectations are met", "There is total military dominance"], "ans": 2, "exp": "Best (2014): 'Peace is a situation in which there is no societal conflict and individuals and groups are able to meet their needs and expectations.'"}, {"ch": 1, "q": "Miller (2005) describes peace as a political condition that ensures:", "opts": ["Military supremacy", "Religious unity", "Total absence of government", "Justice and social stability through institutions and norms"], "ans": 3, "exp": "Miller (2005) frames peace as a political condition ensuring justice and stability through formal/informal institutions."}, {"ch": 1, "q": "The English word 'conflict' is derived from which Latin word?", "opts": ["Pax", "Bellum", "Configere", "Concordia"], "ans": 2, "exp": "'Conflict' derives from the Latin 'configere', meaning 'to strike together'."}, {"ch": 1, "q": "Albert (2010) defines conflict as a struggle over values and claims to scarce:", "opts": ["Land and food only", "Religion and language", "Territory alone", "Status, power and resources"], "ans": 3, "exp": "Albert (2010): conflict is 'a struggle over values and claims to scarce status, power and resources...'"}, {"ch": 1, "q": "According to Rahim (2017), conflict is best described as:", "opts": ["A purely physical act", "A form of government", "A legal category", "An interactive process manifested in incompatibility or disagreement"], "ans": 3, "exp": "Rahim (2017) defines conflict as an interactive process manifested in incompatibility, disagreement, or dissonance."}, {"ch": 1, "q": "Who described conflict as 'the opposition of forces' (1988)?", "opts": ["Quincy", "Galtung", "Khan", "Olaoba"], "ans": 2, "exp": "Khan (1988) is cited as describing conflict as 'the opposition of forces'."}, {"ch": 1, "q": "Quincy (1971) defines conflict primarily as a relationship between:", "opts": ["Individuals only", "International courts", "States or rival factions within a state", "Religious institutions"], "ans": 2, "exp": "Quincy (1971) sees conflict as a relationship between states or rival factions implying subjective hostilities."}, {"ch": 1, "q": "According to Olaoba (2005), a major feature of conflict is that it represents a threat to what?", "opts": ["The 'systemic bond'", "Court proceedings", "The economy alone", "International law"], "ans": 0, "exp": "Olaoba (2005) emphasizes conflict as a fraction of threat to the 'systemic bond', harmful or helpful."}, {"ch": 1, "q": "Peace is described by Ibeanu (2006) as a process linked to:", "opts": ["Religious conversion", "Population growth", "Development and reducing conflict", "Military strength"], "ans": 2, "exp": "Ibeanu (2006): peace is a process involving activities linked to development and reducing conflict."}, {"ch": 1, "q": "Jeong (2017) argues that peace should be understood as:", "opts": ["A purely legal concept", "Only the absence of war", "Impossible to achieve", "Broader than the mere absence of war"], "ans": 3, "exp": "Jeong (2017): peace is not the absence of war but broadly includes conditions guaranteeing positive human existence."}, {"ch": 1, "q": "Galtung (1967) distinguishes 'negative peace' as the absence of:", "opts": ["Religion", "International law", "Positive human conditions", "Direct physical violence"], "ans": 3, "exp": "Negative peace = absence of direct physical violence; positive peace = presence of basic human conditions (Galtung, 1967)."}, {"ch": 1, "q": "Which of these is NOT one of the core features of Peace and Conflict Studies listed in the text?", "opts": ["Diversity in research themes", "Interdisciplinary nature", "Fixed, single-discipline methodology", "Inevitability of violence"], "ans": 2, "exp": "PCS is explicitly described as interdisciplinary, not fixed to a single discipline."}, {"ch": 1, "q": "The core features of Peace and Conflict Studies include a critical attitude toward what?", "opts": ["Religious doctrines only", "Economic theory alone", "Only military structures", "Existing social/global structures that cause inequality"], "ans": 3, "exp": "One core feature is a critical attitude towards structures causing inequality and asymmetric power."}, {"ch": 1, "q": "Which is an example theme listed under 'Diversity in research themes' in Peace and Conflict Studies?", "opts": ["Gender, Conflict and Peace", "Astrophysics", "Marine Biology", "Organic Chemistry"], "ans": 0, "exp": "Listed themes include Human Rights Studies, Gender Conflict and Peace, Justice Studies, etc."}, {"ch": 1, "q": "Regarding the 'Constructive and Destructive Nature of Conflict', the text argues that conflict:", "opts": ["Has no relation to violence", "Can be both negative and positive", "Should always be avoided", "Is always destructive"], "ans": 1, "exp": "The text notes conflict can be both negative and positive, contrary to popular assumption."}, {"ch": 1, "q": "Which is listed as a goal of Peace and Conflict Studies?", "opts": ["Increase military spending", "Encourage economic isolation", "Promote religious uniformity", "Contribute to a more just and sustainable society"], "ans": 3, "exp": "One stated goal is to contribute to creating a more just and sustainable society and globe."}, {"ch": 1, "q": "A key goal of Peace and Conflict Studies is to transform violent societies into ones that are:", "opts": ["Militarized", "Economically dependent", "Fair and peaceful", "Isolated"], "ans": 2, "exp": "A major goal is transforming violent society and world into a fair and peaceful one."}, {"ch": 1, "q": "The educational/training goal of Peace and Conflict Studies focuses on empowering individuals to:", "opts": ["Depend on the state alone", "Join the military", "Avoid all forms of conflict", "Resolve conflicts and build sustainable peace"], "ans": 3, "exp": "The 'Empowering & Training individuals' goal is about equipping people to resolve conflict and build sustainable peace."}, {"ch": 1, "q": "Which scenario is given as an example of 'Conflict within Family' in the text?", "opts": ["Disagreement over a child's career/university choice", "Marriage disputes only", "Divorce proceedings", "Sibling rivalry over toys"], "ans": 0, "exp": "The text uses parent-child disagreement over career/university choice as the family conflict example."}, {"ch": 1, "q": "Which real-world example is given for 'Inter-state trade friction'?", "opts": ["US–China tariff dispute under Trump", "The Falklands War", "NAFTA negotiations", "Brexit"], "ans": 0, "exp": "The text cites Trump imposing tariffs on Chinese goods and China's retaliatory tariffs as the trade friction example."}, {"ch": 1, "q": "Which historical example illustrates 'Conflict over resources' in the text?", "opts": ["The China–Japan Senkaku Islands dispute", "The Falklands War", "The Suez Crisis", "The Cuban Missile Crisis"], "ans": 0, "exp": "The China-Japan conflict over Senkaku Island is given as a resource-control conflict example."}, {"ch": 1, "q": "Which of these individuals is NOT mentioned as an example of an influential peace figure in the text?", "opts": ["Mahatma Gandhi", "Desmond Tutu", "Nelson Mandela", "Winston Churchill"], "ans": 3, "exp": "The text lists Gandhi, Martin Luther King Jr., Mandela, Dalai Lama, and Desmond Tutu — not Churchill (who appears later, in Ch.6, re: the UN)."}, {"ch": 1, "q": "After which event did radical religious groups gain worldwide attention, according to the text?", "opts": ["The fall of the Berlin Wall", "The Rwandan genocide", "The 9/11 terrorist attacks", "World War I"], "ans": 2, "exp": "The text states that after the 9/11 attacks, radical religious groups gained worldwide attention."}, {"ch": 1, "q": "During the Cold War, before religion gained international attention, it was mostly perceived as:", "opts": ["A purely economic institution", "Irrational and agitating violence", "The primary driver of diplomacy", "Central to international law"], "ans": 1, "exp": "Before receiving attention, religion was seen as merely irrational and agitating violence in IR."}, {"ch": 1, "q": "The 2004 Madrid train bombing occurred on what date?", "opts": ["September 11, 2001", "November 13, 2015", "March 11, 2004", "July 7, 2005"], "ans": 2, "exp": "The text specifies the Madrid train bombing attacks occurred on March 11, 2004."}, {"ch": 1, "q": "According to the text, what ultimately leads religious identity to become a source of violence?", "opts": ["Lack of religious education", "Practicing more than one religion", "Simply having a religion", "The absolutization of religious doctrine"], "ans": 3, "exp": "The text argues it is the absolutization of religious doctrine/truth — not religion itself — that leads to mutual intolerance and violence."}, {"ch": 1, "q": "Which mindset does the text associate with radical religious thought?", "opts": ["Pluralism", "Relativism", "The 'excluded middle' or 'either-or' stance", "Secular humanism"], "ans": 2, "exp": "Radical thought is informed by the principle of 'the excluded middle', an either-or stance dividing in-group vs out-group."}, {"ch": 1, "q": "Structural violence, as described in the text, refers to conditions such as:", "opts": ["Natural disasters", "Direct armed combat", "Systemic inequality embedded in institutions, poverty, marginalization", "Verbal insults"], "ans": 2, "exp": "Structural violence involves systemic inequality embedded in institutions, poverty, marginalization, unemployment etc."}, {"ch": 1, "q": "Cultural violence, according to Galtung (1990), is codified in:", "opts": ["Beliefs and ideologies that justify violence, e.g., ethnic superiority", "Formal legal codes only", "International treaties", "Economic policy documents"], "ans": 0, "exp": "Cultural violence involves beliefs/ideologies justifying violence such as ethnic superiority and religious extremism (Galtung, 1990)."}, {"ch": 1, "q": "Which four actors/roles does the text identify in the study and practice of peace and conflict?", "opts": ["Only the UN", "States, international/regional organizations, NGOs, and ethnic/religious groups", "Only individuals", "Only states"], "ans": 1, "exp": "The text identifies the state, international/regional organizations, NGOs, and ethnic/religious/other groups as key actors."}, {"ch": 1, "q": "In the family conflict example, what does the text warn could happen if such disagreements are not handled well?", "opts": ["The relationship could become strained", "It becomes a national issue", "It automatically resolves itself", "Nothing significant happens"], "ans": 0, "exp": "The text warns that if the family conflict scenario is not handled well, the relationship could become strained."}, {"ch": 1, "q": "Peace and Conflict Studies is described in the text as having shifted its focus from what to what?", "opts": ["From a state-centric focus to a human-centered approach", "From human-centered to state-centric", "From religious to secular focus", "From local to purely global focus"], "ans": 0, "exp": "Richmond (2020) is cited: peace studies shifted from a state-centric focus to a human-centered approach, especially in postcolonial societies."}, {"ch": 1, "q": "What is described as the least adversarial and most fundamental informal method mentioned in the introduction chapter's conflict discussion?", "opts": ["Litigation", "Court adjudication", "Negotiation", "Arbitration"], "ans": 2, "exp": "While detailed in Chapter 3, negotiation is introduced as the most fundamental, informal way parties resolve disagreements without a third party."}, {"ch": 1, "q": "Which statement best reflects the chapter's conclusion on peace and conflict?", "opts": ["Conflict is always avoidable", "Peace equals total absence of disagreement", "Peace is both the absence of violence and the presence of justice, and conflict is manageable", "Conflict cannot be resolved"], "ans": 2, "exp": "The conclusion states peace is both negative (absence of violence) and positive (presence of justice), and conflict, though inevitable, is manageable."}, {"ch": 2, "q": "Who introduced the theory of Negative and Positive Peace?", "opts": ["Rawls", "Lederach", "Marx", "Galtung"], "ans": 3, "exp": "Galtung (2005) introduced the Negative and Positive Peace Theory."}, {"ch": 2, "q": "In Galtung's theory, 'positive peace' emphasizes:", "opts": ["Only the absence of war", "Harmony in society and removal of structures limiting human growth", "Military strength", "Legal punishment"], "ans": 1, "exp": "Positive peace goes beyond absence of violence to emphasize social harmony and removing limiting structures."}, {"ch": 2, "q": "Galtung (2008) drew inspiration from which Japanese concept for a broader peace theory?", "opts": ["Kyosei", "Wabi-sabi", "Ikigai", "Kaizen"], "ans": 0, "exp": "Galtung (2008) drew on the Japanese concept of Kyosei — living and working together for the common good."}, {"ch": 2, "q": "Lay theories of peace, as explained by Leshem and Halperin (2020), are based on how many main ideas?", "opts": ["Two", "Three", "One", "Five"], "ans": 1, "exp": "Lay theories of peace rest on three ideas: peace as absence of war, peace as harmonious relationships, and peace as justice."}, {"ch": 2, "q": "Leshem and Halperin applied lay theories of peace to which real-world conflict?", "opts": ["The Cold War", "The Nigerian Civil War", "The Rwandan genocide", "The Israeli-Palestinian conflict"], "ans": 3, "exp": "They applied the idea to the Israeli-Palestinian conflict and suggested a binational state solution."}, {"ch": 2, "q": "Peacebuilding theory was mainly developed by:", "opts": ["Etzioni (2015)", "Rawls (1971)", "Lederach (1997)", "Marx (19th century)"], "ans": 2, "exp": "Peacebuilding theory was developed mainly by Lederach (1997), building on Galtung's earlier use of the term."}, {"ch": 2, "q": "According to Sandole (2010), peacebuilding is best described as:", "opts": ["A purely military operation", "A one-time legal event", "A flexible, ongoing process strengthening positive peace", "A form of punishment"], "ans": 2, "exp": "Sandole (2010) describes peacebuilding as a flexible and ongoing process aimed at strengthening positive peace."}, {"ch": 2, "q": "Peacebuilding can be classified as proactive or:", "opts": ["Static", "Passive", "Neutral", "Reactive"], "ans": 3, "exp": "Peacebuilding can be proactive (before conflict) or reactive (after conflict has begun)."}, {"ch": 2, "q": "Communitarian theory, associated with Etzioni (2015), contrasts with:", "opts": ["Structural realism", "Western individualism", "Legal positivism", "Religious pluralism"], "ans": 1, "exp": "Communitarian theory contrasts with Western individualism, focusing on shared values and collective responsibility."}, {"ch": 2, "q": "The African concept representing communal humanism and justice, linked to communitarian theory, is called:", "opts": ["Kyosei", "Ubuntu", "Harambee", "Sharia"], "ans": 1, "exp": "Ubuntu represents African humanism and justice, expressing communitarian values (Ndeche, 2022)."}, {"ch": 2, "q": "The Theory of Justice, based on fairness and equality, was developed by:", "opts": ["Marx", "Rawls", "Carr", "Galtung"], "ans": 1, "exp": "Rawls (1971; 1999) developed the Theory of Justice based on fairness and equality."}, {"ch": 2, "q": "Rawls's Theory of Justice argues that a peaceful society depends on:", "opts": ["Religious homogeneity", "Unlimited free markets", "Strong monarchy", "A shared understanding of justice with fair distribution"], "ans": 3, "exp": "Rawls argues peaceful society depends on a shared understanding of justice where resources/opportunities are distributed fairly."}, {"ch": 2, "q": "Social Movement Theory developed to explain:", "opts": ["Why states go to war", "Why courts issue rulings", "Why people organize protests and collective actions", "Why economies grow"], "ans": 2, "exp": "Social Movement Theory explains how and why people organize protests/collective action."}, {"ch": 2, "q": "Karl Marx's Conflict Theory centers on struggle between:", "opts": ["Genders only", "Classes competing for limited resources", "Religions", "Nations only"], "ans": 1, "exp": "Marx's conflict theory focuses on class struggle between groups competing for limited resources."}, {"ch": 2, "q": "Which analytical tools were developed from conflict theory to analyze conflicts, per the text?", "opts": ["The SWOT matrix", "The Balance Sheet model", "The Ansoff Matrix", "The Conflict Tree and Onion (PIN) model"], "ans": 3, "exp": "The Conflict Tree and the Onion (PIN: Position, Interest, Needs) model are cited as tools from this theoretical tradition."}, {"ch": 2, "q": "Structural Conflict Theory, as explained by Loadenthal (2018), argues conflicts arise from:", "opts": ["Random chance", "Personal grudges only", "Religious rituals", "Unfair social structures and relationships"], "ans": 3, "exp": "Loadenthal (2018) explains structural conflicts arise from unfair social structures and relationships."}, {"ch": 2, "q": "Conflict Transformation Theory was developed by:", "opts": ["Rawls (1971)", "Marx (19th century)", "Waltz (1979)", "Lederach (1996)"], "ans": 3, "exp": "Conflict Transformation Theory was developed by Lederach (1996), going beyond resolution to changing root relationships/conditions."}, {"ch": 2, "q": "Realist Theory explains conflict primarily through:", "opts": ["Human selfishness and the desire for power", "Legal frameworks", "Economic cooperation", "Religious doctrine"], "ans": 0, "exp": "Realism explains conflict based on human selfishness and the desire for power, emphasizing state, national interest, power."}, {"ch": 2, "q": "Which scholars are credited with developing classical Realist Theory?", "opts": ["Carr (1939) and Morgenthau (1948)", "Lederach and Galtung", "Marx and Engels", "Rawls and Etzioni"], "ans": 0, "exp": "Carr (1939) and Morgenthau (1948) developed realist theory to explain state behaviour in global politics."}, {"ch": 2, "q": "Waltz (1979) expanded realism into which theory?", "opts": ["Communitarianism", "Neorealism", "Liberal institutionalism", "Idealism"], "ans": 1, "exp": "Waltz (1979) expanded realism into neorealism, focused on the structure of the international system."}, {"ch": 2, "q": "According to the text, Classical realism attributes conflict to:", "opts": ["Human nature", "Religious extremism", "Lack of global authority", "Economic inequality"], "ans": 0, "exp": "Classical realism traces conflict to human nature, while neorealism blames anarchy (lack of global authority)."}, {"ch": 2, "q": "Neorealism attributes conflict primarily to:", "opts": ["The lack of global authority (anarchy)", "Religious doctrine", "Class struggle", "Human emotion"], "ans": 0, "exp": "Neorealism explains conflict as arising from the anarchic (no higher authority) structure of the international system."}, {"ch": 2, "q": "Neoclassical realism is distinguished by combining:", "opts": ["Only economic factors", "Only religious factors", "Only legal factors", "Both internal and external factors"], "ans": 3, "exp": "Neoclassical realism combines both internal (domestic) and external (systemic) factors."}, {"ch": 2, "q": "The Idealist Concept of Harmony of Interests suggests that:", "opts": ["Power alone determines outcomes", "States should isolate themselves", "War is inevitable", "People and nations can recognize shared interests and cooperate"], "ans": 3, "exp": "Idealism suggests people/nations can recognize shared interests and cooperate for mutual benefit."}, {"ch": 2, "q": "Carr (1939) criticized idealism by arguing that:", "opts": ["Peace is impossible", "Powerful groups present their own interests as universal values", "Realism has no value", "Idealism is entirely correct"], "ans": 1, "exp": "Carr (1939) argued conflicts arise because powerful groups present self-interest as universal values like peace/justice."}, {"ch": 2, "q": "Which theory combines elements of both realism and idealism through cooperation via international institutions?", "opts": ["Structural Conflict Theory", "Communitarian theory", "Social Movement Theory", "Liberal institutionalism"], "ans": 3, "exp": "Liberal institutionalism combines elements of realism and idealism, promoting cooperation through institutions and trade."}, {"ch": 2, "q": "A criticism raised against realist theory in the text is that it is:", "opts": ["Too idealistic", "Purely religious", "Eurocentric and doesn't reflect African/Asian perspectives", "Too focused on Africa"], "ans": 2, "exp": "Some scholars argue realist theory is Eurocentric and doesn't fully reflect African or Asian perspectives."}, {"ch": 2, "q": "Gawerc (2006) argues that effective peacebuilding must combine conflict resolution with:", "opts": ["Military strength", "Religious doctrine", "Social justice", "Trade agreements"], "ans": 2, "exp": "Gawerc (2006) argues peacebuilding must combine conflict resolution with social justice."}, {"ch": 2, "q": "According to the text, what forms of justice does Rawls's theory particularly support within Peace and Conflict Studies?", "opts": ["Distributive, retributive, and restorative justice", "Only retributive justice", "Only criminal justice", "Only distributive justice"], "ans": 0, "exp": "Rawls's theory is said to support distributive, retributive, and restorative forms of justice in PCS."}, {"ch": 2, "q": "Which earlier thinker's concept of natural justice does Rawls's theory draw from?", "opts": ["Confucius", "Aristotle", "Socrates", "Plato"], "ans": 1, "exp": "Rawls draws from Aristotle's earlier concept of natural justice."}, {"ch": 3, "q": "Alternative Dispute Resolution (ADR) is best defined as:", "opts": ["A branch of the police force", "A type of criminal punishment", "Methods of resolving disputes as alternatives/supplements to the courts", "A UN peacekeeping mission"], "ans": 2, "exp": "Dr. Orojo defines ADR as methods used to resolve disputes as alternatives, or supplements, to the traditional court mechanism."}, {"ch": 3, "q": "Which section of the 1999 Nigerian Constitution (as amended) provides for settlement of disputes by arbitration, mediation etc.?", "opts": ["Section 6", "Section 33", "Section 19(d)", "Section 1"], "ans": 2, "exp": "Section 19(d) of the 1999 Constitution provides for settlement of disputes by Arbitration, Mediation, Conciliation, Negotiation, and Adjudication."}, {"ch": 3, "q": "Which ADR mechanism is described in the text as legally binding on the parties?", "opts": ["Conciliation", "Negotiation", "Mediation", "Arbitration"], "ans": 3, "exp": "Arbitration is a binding ADR mechanism — parties are bound by the arbitrator's decision, unlike negotiation/mediation/conciliation."}, {"ch": 3, "q": "In Union Bank of Nigeria Ltd v. Ozigi, the Supreme Court upheld:", "opts": ["A negotiated agreement between the parties", "A constitutional amendment", "An arbitration award", "A criminal conviction"], "ans": 0, "exp": "The Supreme Court upheld a negotiated agreement, reinforcing enforceability of properly concluded negotiated settlements."}, {"ch": 3, "q": "Which ADR method involves a neutral third party who facilitates dialogue but does NOT impose a binding decision?", "opts": ["Arbitration", "Mediation", "Adjudication", "Litigation"], "ans": 1, "exp": "Mediation involves a neutral mediator facilitating dialogue toward a voluntary, non-binding resolution."}, {"ch": 3, "q": "Which ADR mechanism is described as 'the most fundamental and informal' method?", "opts": ["Conciliation", "Arbitration", "Adjudication", "Negotiation"], "ans": 3, "exp": "Negotiation is called the most fundamental and informal ADR method, done without a third party."}, {"ch": 3, "q": "Reconciliation, as an ADR mechanism, focuses primarily on:", "opts": ["Punishing wrongdoers", "Enforcing contracts strictly", "Restoring relationships and societal harmony", "Increasing court caseloads"], "ans": 2, "exp": "Reconciliation focuses on restoring relationships and promoting harmony, rather than merely settling disputes."}, {"ch": 3, "q": "Bargaining, as described in the text, forms the basis of which other ADR processes?", "opts": ["Adjudication only", "International law", "Negotiation, mediation, and conciliation", "Litigation only"], "ans": 2, "exp": "Bargaining forms the basis of negotiation, mediation, and conciliation processes in ADR."}, {"ch": 3, "q": "According to the text, mediation is especially prevalent in which types of disputes?", "opts": ["Only international treaties", "Employment, family, divorce, and commercial disagreements", "Only tax disputes", "Only criminal cases"], "ans": 1, "exp": "Mediation is described as especially prevalent in employment conflicts, family disputes, divorce, and commercial disagreements."}, {"ch": 3, "q": "What practical example does the text give of mandatory arbitration?", "opts": ["Land tribunals", "Arbitration clauses in credit card agreements", "Divorce settlements", "Traffic court"], "ans": 1, "exp": "The text cites mandatory arbitration in credit card agreements, where consumers unknowingly waive their right to sue."}, {"ch": 3, "q": "Which ADR component focuses on identifying signs and triggers before disputes escalate?", "opts": ["Litigation", "Adjudication", "Arbitration", "Early Warning"], "ans": 3, "exp": "Early Warning refers to timely identification of signs/indicators/triggers that may lead to disputes or violence."}, {"ch": 3, "q": "Which of these is listed as a 'Key Element of an Early Warning System'?", "opts": ["Tax collection", "Currency devaluation", "Military conscription", "Conflict mapping"], "ans": 3, "exp": "Key elements listed include information gathering, conflict mapping, monitoring indicators, and rapid communication."}, {"ch": 3, "q": "Which is listed as a 'Major Preventive Strategy' in ADR?", "opts": ["Currency reform", "Border closure", "Trade embargoes", "Capacity Building"], "ans": 3, "exp": "Listed preventive strategies include Dialogue/Consultation, Capacity Building, Policy Frameworks, Awareness/Education, and Inclusive Decision-Making."}, {"ch": 3, "q": "'Peace Making' within ADR is rooted in mutual respect, communication, and:", "opts": ["The pursuit of lasting harmony", "Military intervention", "Strict legal punishment", "Economic sanctions"], "ans": 0, "exp": "Peace making is rooted in mutual respect, communication, and the pursuit of lasting harmony."}, {"ch": 3, "q": "Digital and Online Dispute Resolution (ODR) is described as a recent development that:", "opts": ["Is illegal in Nigeria", "Enables mediation/arbitration through digital platforms", "Only applies to criminal law", "Replaces all court systems"], "ans": 1, "exp": "ODR uses technology to enable mediation, arbitration, and negotiation via digital platforms, making ADR more accessible."}, {"ch": 3, "q": "Rule 15(3)(d) of the Rules of Professional Conduct for Legal Practitioners mandates that lawyers:", "opts": ["Only use arbitration", "Attempt ADR before bringing a matter to court", "Charge flat fees for all cases", "Avoid ADR entirely"], "ans": 1, "exp": "Rule 15(3)(d) mandates lawyers to attempt an alternative dispute resolution before going to court."}, {"ch": 3, "q": "'Multi-track Diplomacy' in peacebuilding is best described as viewing international peace-making as:", "opts": ["A living system of interconnected activities and actors", "A purely military exercise", "A single government activity", "A UN-only process"], "ans": 0, "exp": "Multi-track diplomacy views peace-making as a living system of interconnected activities, individuals, institutions, and communities."}, {"ch": 3, "q": "Which of the following is NOT listed among the ADR methods in the text?", "opts": ["Court martial", "Conciliation", "Negotiation", "Mediation"], "ans": 0, "exp": "ADR methods listed include negotiation, mediation, conciliation, arbitration, early neutral evaluation, mini-trials, etc. — not court martial, which is a military tribunal."}, {"ch": 3, "q": "Non-binding ADR methods are characterized by decisions that are:", "opts": ["Automatically appealed", "Legally final", "Mainly consensual, and parties can decide not to be bound", "Always enforced by police"], "ans": 2, "exp": "Non-binding ADR (negotiation, mediation, conciliation, neutral evaluation) results in consensual decisions parties can choose not to be bound by."}, {"ch": 3, "q": "Why did the need for alternative dispute resolution methods arise, according to the text?", "opts": ["Overuse of arbitration", "Absence of any laws", "Court delays, case overload, and financial burden of litigation", "Lack of judges' knowledge"], "ans": 2, "exp": "The text notes court cases could take two+ years due to complexity, case overload, and financial burden — prompting ADR's rise."}, {"ch": 4, "q": "Which of these is listed as a humanitarian consequence of conflict in Nigeria?", "opts": ["Increased tax revenue", "Improved literacy", "Mass internal displacement (IDPs)", "Stronger currency"], "ans": 2, "exp": "Humanitarian consequences listed include loss of life, mass displacement (IDPs), crises in access to food/water/healthcare."}, {"ch": 4, "q": "The Boko Haram conflict led to cumulative economic losses of approximately how much by 2021?", "opts": ["$10 billion", "$100 billion", "$1 billion", "$500 million"], "ans": 1, "exp": "The text states the Boko Haram conflict led to cumulative losses of approximately $100 billion to 2021."}, {"ch": 4, "q": "How many children were reported out of school due to the Boko Haram conflict, per the text?", "opts": ["100,000", "500,000", "10 million", "1 million"], "ans": 3, "exp": "The text states 1 million children were out of school due to the Boko Haram conflict, alongside 2 million displaced."}, {"ch": 4, "q": "Which of these is classified as a 'political consequence' of conflict in the text?", "opts": ["Stronger local currency", "Higher literacy rates", "Weakened governance and institutions", "Improved food security"], "ans": 2, "exp": "Political consequences listed include weakened governance/institutions, erosion of trust, and political instability."}, {"ch": 4, "q": "Which secessionist movement is cited as an example of increased ethnic/regional tension from conflict?", "opts": ["ECOMOG", "IPOB", "AMISOM", "MOSOP"], "ans": 1, "exp": "The text cites IPOB as an example of secessionist movements encouraged by increased identity politics/tensions."}, {"ch": 4, "q": "Post-conflict reconstruction in Nigeria involves rebuilding infrastructure, rehabilitating communities, and:", "opts": ["Banning NGOs", "Reintegrating ex-combatants", "Reducing all social services", "Expanding the military only"], "ans": 1, "exp": "Post-conflict reconstruction involves rebuilding infrastructure, rehabilitating communities, reintegrating ex-combatants, and strengthening governance."}, {"ch": 4, "q": "International Humanitarian Law (IHL) mandates protection especially for:", "opts": ["Only foreign nationals", "Only government officials", "Only soldiers", "Civilians and vulnerable groups like women, children, and the displaced"], "ans": 3, "exp": "IHL mandates protection of civilians, especially vulnerable groups: women, children, the elderly, and the displaced."}, {"ch": 4, "q": "IHL requires a distinction to be made between:", "opts": ["Legal and illegal migrants", "Rich and poor", "Combatants and civilians", "Rural and urban populations"], "ans": 2, "exp": "IHL requires distinction between combatants and civilians, prohibiting attacks on non-combatants."}, {"ch": 4, "q": "According to the text, what is a major challenge in enforcing IHL?", "opts": ["Parties failing to uphold their obligations", "Absence of the UN", "Excessive funding", "Lack of any written laws"], "ans": 0, "exp": "Enforcement remains a major challenge due to parties failing to uphold their obligations under IHL."}, {"ch": 4, "q": "Which sector is specifically noted as being severely damaged by Middle Belt farmer-herder conflicts?", "opts": ["Local economies through blocked trade and destroyed assets", "Tourism only", "The tech industry", "The banking sector only"], "ans": 0, "exp": "Middle Belt farmer-herder conflicts destroy assets, block trade, and stop investment, severely damaging local economies."}, {"ch": 4, "q": "Gender-Based Violence (GBV) is described in the text as being used as a:", "opts": ["Peacebuilding tool", "Weapon of war", "Legal defense", "Economic incentive"], "ans": 1, "exp": "The text states rape, sexual torture, and exploitation are increasingly used as weapons of war in conflict."}, {"ch": 4, "q": "Which of these is listed among the social consequences of conflict?", "opts": ["Reduced ethnic tension", "Stronger institutions", "Improved trade relations", "Social fragmentation and mistrust between communities"], "ans": 3, "exp": "Social consequences include social fragmentation, mistrust, trauma, and disruption of essential services."}, {"ch": 4, "q": "In extreme cases of persistent insecurity, the text notes the emergence of:", "opts": ["Stronger federal control", "Reduced local government activity", "New international borders", "Parallel governance structures challenging state legitimacy"], "ans": 3, "exp": "Persistent insecurity can lead to parallel governance structures emerging in conflict-prone areas, as noted in states like Zamfara, Sokoto, Benue."}, {"ch": 5, "q": "The Nigerian Civil War is also known as the:", "opts": ["Zango Kataf Crisis", "Boko Haram Insurgency", "Biafran War", "Niger Delta Crisis"], "ans": 2, "exp": "The Nigerian Civil War is also known as the Biafran War / Nigerian-Biafran War."}, {"ch": 5, "q": "The Nigerian Civil War lasted from:", "opts": ["1979 to 1983", "1960 to 1963", "1999 to 2003", "July 1967 to January 1970"], "ans": 3, "exp": "The war lasted from 6th July 1967 to 15th January 1970 (about 30 months)."}, {"ch": 5, "q": "Who led the Biafran side as the central figure in the Nigerian Civil War?", "opts": ["Tafawa Balewa", "General Yakubu Gowon", "Colonel Chukwuemeka Odumegwu Ojukwu", "General Aguiyi-Ironsi"], "ans": 2, "exp": "Colonel Chukwuemeka Odumegwu Ojukwu, military Governor of the Eastern region, was the central Biafran figure."}, {"ch": 5, "q": "Which resource is noted as playing a vital strategic role in the Civil War?", "opts": ["Coal in the Middle Belt", "Oil production in the Niger Delta", "Groundnuts in the North", "Cocoa in the West"], "ans": 1, "exp": "Control over the lucrative oil production in the Niger Delta played a vital strategic role in the war."}, {"ch": 5, "q": "According to Weisberg (1975), civilian deaths in the Civil War ranged as high as:", "opts": ["500,000", "6 million", "1 million", "100,000"], "ans": 1, "exp": "Weisberg (1975) observed civilian deaths ranged from 500,000 to as high as 6 million, with 100,000 military casualties."}, {"ch": 5, "q": "Which Prime Minister was assassinated in the 1966 coup, according to the text?", "opts": ["Yakubu Gowon", "Tafawa Balewa", "Obafemi Awolowo", "Nnamdi Azikiwe"], "ans": 1, "exp": "Prime Minister Tafawa Balewa and Northern Region Premier Ahmadu Bello were assassinated in the 1966 coup."}, {"ch": 5, "q": "Approximately how many Igbos were killed by northern mobs after the counter-coup, per the text?", "opts": ["3,000", "3 million", "300,000", "30,000"], "ans": 3, "exp": "The text states northern mobs killed 30,000 Igbos, setting Nigeria on fire (Weisberg, 1975)."}, {"ch": 5, "q": "The Zango Kataf Crisis is associated with which region of Nigeria?", "opts": ["South-West", "Southern Kaduna", "Niger Delta", "North-East"], "ans": 1, "exp": "The Zango Kataf Crisis occurred in Southern Kaduna State."}, {"ch": 5, "q": "Which ethnic group is described as the dominant group in the Zangon Katab area?", "opts": ["Igbo", "Hausa", "Atyap", "Fulani"], "ans": 2, "exp": "The Zangon Katab area has the Atyap as the dominant ethnic group."}, {"ch": 5, "q": "The burning down of which institution in 1987 signaled escalating hatred in Southern Kaduna?", "opts": ["Ahmadu Bello University", "College of Education, Kafanchan", "University of Ibadan", "Bayero University"], "ans": 1, "exp": "The 1987 burning of College of Education Kafanchan signaled the escalating hatred between Christians and Muslims."}, {"ch": 5, "q": "The Zango Kataf crisis was notably bloody on which dates in 1992?", "opts": ["October 1st and December 25th", "January 1st and March 3rd", "June 12th and July 4th", "February 6th and May 15th–16th"], "ans": 3, "exp": "The text specifies the crisis was bloody on February 6th and May 15th–16th, 1992."}, {"ch": 5, "q": "Human Rights Watch described the Zango Kataf violence as:", "opts": ["A minor local dispute", "An isolated incident with no casualties", "The single worst outbreak of violence in Nigeria since the 1967-70 civil war", "A purely economic conflict"], "ans": 2, "exp": "Human Rights Watch described it as the single worst outbreak of violence in Nigeria since the civil war."}, {"ch": 5, "q": "The Ungwan Wakili massacre occurred in which month/year?", "opts": ["February 2000", "March 1987", "March 2023", "May 1992"], "ans": 2, "exp": "The Ungwan Wakili massacre, killing at least 17 people, occurred in March 2023 in Zangon Kataf LGA."}, {"ch": 5, "q": "Between 2017 and early 2023, how many lives were reported lost in Atyapland (Zangon Kataf area)?", "opts": ["Over 518", "Over 5 million", "Over 50", "Over 5,000"], "ans": 0, "exp": "Over 518 lives were lost and 18 villages razed in Atyapland between 2017 and early 2023."}, {"ch": 5, "q": "The 2000 Kaduna violence occurred in two waves sometimes referred to as:", er mechanisms."}, {"ch": 5, "q": "Boko Haram's founder, whose 2009 extrajudicial killing further radicalized the group, was:", "opts": ["Sanusi Lamido Sanusi", "Isaac Adaka Boro", "Mohammed Yusuf", "Abubakar Shekau"], "ans": 2, "exp": "Mohammed Yusuf, Boko Haram's founder, was extrajudicially killed in 2009, radicalizing rather than dismantling the group."}, {"ch": 5, "q": "Boko Haram's ideology is fundamentally rooted in a rejection of:", "opts": ["Traditional African religion", "Western education, values, and governance structures", "Democracy in general", "Islamic teachings"], "ans": 1, "exp": "Boko Haram's ideology rejects Western education, values, and governance as corrupting influences on Islamic society."}, {"ch": 5, "q": "According to the theory of relative deprivation cited in the text, discontent leading to violence arises when people feel:", "opts": ["Deprived of something they expected to have", "Religiously tolerant", "Politically overrepresented", "Overly wealthy"], "ans": 0, "exp": "Relative deprivation theory explains that feeling deprived of expected benefits breeds discontent that can lead to violence."}, {"ch": 5, "q": "Onuoha (2013) found that a leading factor in youth adoption of extreme religious views was:", "opts": ["High literacy rates", "Ignorance of religious teaching", "Excess wealth", "Urban migration"], "ans": 1, "exp": "Onuoha (2013) found 'ignorance of religious teaching' the leading factor influencing extreme religious views among youth."}, {"ch": 5, "q": "Krieger and Meierrieks argue that democratic countries may be more prone to terrorism because:", "opts": ["They have stronger militaries", "They have no international relations", "Civil liberties and free press create openings terrorists can exploit", "They lack any laws"], "ans": 2, "exp": "They argue democratic ideals like civil liberties and free press open doors terrorists can exploit and hinder counter-terrorism."}, {"ch": 5, "q": "Which of these is NOT listed as a cause of f n Nigeria is defined in the text as organized violent crimes such as:", "opts": ["Armed robbery, kidnapping, and cattle rustling", "Only tax evasion", "Only cybercrime", "Only election fraud"], "ans": 0, "exp": "Banditry includes armed robbery, kidnapping for ransom, cattle rustling, village raids, and farmland destruction."}, {"ch": 5, "q": "Where do many illegal weapons used by bandits in Nigeria reportedly flow in from, per the text?", "opts": ["Europe only", "Only local factories", "South America", "Conflict zones in the Sahel and Libya"], "ans": 3, "exp": "Many weapons flow in from conflict zones in the Sahel and Libya, plus Nigeria's porous borders."}, {"ch": 5, "q": "The Ife-Modakeke crisis is centered in which state?", "opts": ["Osun State", "Delta State", "Benue State", "Anambra State"], "ans": 0, "exp": "The Ife-Modakeke crisis is centered in Osun State, between the Modakeke and the Ife (led by the Ooni of Ife)."}, {"ch": 5, "q": "What action did the government take to ease tensions in the Ife-Modakeke crisis?", "opts": ["Dissolved the Ooni's throne", "Deployed federal troops permanently", "Relocated the Modakeke abroad", "Created Ife East Local Government"], "ans": 3, "exp": "The government created Ife East Local Government to give Modakeke some autonomy and facilitate peace accords."}, {"ch": 5, "q": "The Aguleri-Umuleri conflict, centered on Otuocha land, occurred in which state?", "opts": ["Anambra State", "Delta State", "Kano State", "Taraba State"], "ans": 0, "exp": "The Aguleri-Umuleri conflict over Otuocha land is in Anambra State."}, {"ch": 5, "q": "The Tiv-Jukun crisis is centered around which town in Taraba State?", "opts": ["Warri", "Wukari", "Ife", "Kafanchan"], "ans": 1, "exp": "The Tiv-Jukun crisis centers on Wukari, Taraba State, involving the indigene-settler dichotomy."}, {"ch": 5, "q": "The Warri Crisis involved disputes among which three ethnic groups?", "opts": ["Igbo, Hausa, and Yoruba", "Itsekiri, Ijaw, and Urhobo", "Tiv, Jukun, and n", "The Concert of Europe", "The Organization of American States"], "ans": 0, "exp": "The UN was motivated by the failure of the League of Nations (founded 1919), which lacked strong structures."}, {"ch": 6, "q": "The Atlantic Charter was signed in August 1941 by Roosevelt and:", "opts": ["Winston Churchill", "Neville Chamberlain", "Joseph Stalin", "Charles de Gaulle"], "ans": 0, "exp": "The Atlantic Charter was signed by U.S. President Franklin D. Roosevelt and British PM Winston Churchill."}, {"ch": 6, "q": "The Declaration by United Nations was signed by 26 nations in:", "opts": ["1945", "1919", "January 1942", "August 1941"], "ans": 2, "exp": "By January 1942, 26 nations fighting the Axis powers signed the Declaration by United Nations."}, {"ch": 6, "q": "How many member states currently have equal representation in the UN General Assembly?", "opts": ["15", "193", "5", "50"], "ans": 1, "exp": "The General Assembly has 193 member states, each with one vote."}, {"ch": 6, "q": "The UN Security Council has how many permanent members with veto power?", "opts": ["193", "5", "10", "15"], "ans": 1, "exp": "The Security Council has 5 permanent members with veto power: US, UK, France, Russia, and China."}, {"ch": 6, "q": "How many non-permanent members serve on the UN Security Council, and for how long?", "opts": ["20 members, elected for three years", "10 members, elected for two years", "5 members, elected for one year", "15 members, elected for five years"], "ans": 1, "exp": "There are 10 non-permanent members elected for two-year terms, alongside the 5 permanent members."}, {"ch": 6, "q": "The International Court of Justice (ICJ), the UN's judicial organ, is based in:", "opts": ["The Hague, Netherlands", "New York, USA", "Geneva, Switzerland", "Brussels, Belgium"], "ans": 0, "exp": "The ICJ, often called the World Court, is based in The Hague, Netherlands."}, {"ch": 6, "q": "Who can appear as parties before the International Court of Justice?", "opts": ["Only states, e entered into force on:", "opts": ["17 July 1998", "1 July 2002", "1945", "1993"], "ans": 1, "exp": "The Rome Statute entered into force on 1 July 2002, establishing ICC jurisdiction going forward."}, {"ch": 6, "q": "Who was convicted by the ICC in 2012 for recruiting child soldiers in the DRC?", "opts": ["Omar al-Bashir", "Thomas Lubanga", "Germain Katanga", "Joseph Kony"], "ans": 1, "exp": "Thomas Lubanga was convicted in 2012 by the ICC for recruiting child soldiers."}, {"ch": 6, "q": "The ICC issued arrest warrants against Sudan's former president for genocide relating to which conflict?", "opts": ["The Darfur conflict", "The Rwandan genocide", "The Niger Delta crisis", "The Libyan uprising"], "ans": 0, "exp": "Omar al-Bashir faced ICC arrest warrants for genocide, war crimes, and crimes against humanity in Darfur."}, {"ch": 6, "q": "The ICC's involvement in Northern Uganda targeted leaders of which armed group?", "opts": ["MOSOP", "Al-Shabaab", "The Lord's Resistance Army (LRA)", "Boko Haram"], "ans": 2, "exp": "The ICC issued arrest warrants against LRA leaders, including Joseph Kony, for the Northern Uganda conflict."}, {"ch": 6, "q": "Which two Ivorian figures were indicted by the ICC after the 2010-2011 post-election violence?", "opts": ["Thomas Lubanga and Germain Katanga", "Omar al-Bashir and Joseph Kony", "Alassane Ouattara and Guillaume Soro", "Laurent Gbagbo and Charles Blé Goudé"], "ans": 3, "exp": "The ICC indicted former president Laurent Gbagbo and Charles Blé Goudé for crimes against humanity."}, {"ch": 6, "q": "Which Kenyan figures were indicted by the ICC after the 2007-2008 post-election violence?", "opts": ["William Ruto and Uhuru Kenyatta", "Gaddafi and al-Senussi", "Jean-Pierre Bemba and Sanusi", "Laurent Gbagbo and Blé Goudé"], "ans": 0, "exp": "Deputy President William Ruto and Uhuru Kenyatta (later president) were among six individuals indicted by the ICC."}, {"ch": 6, "q": "Jean-Pierre Bemba was prosecuted by the ICC for crimes committed by his militia in which country?", "opts": ["Libya", "Kenya", "Sudan", "The Central African Republic (CAR)"], "ans": 3, "exp": "Bemba, a former Congolese vice president, was prosecuted for crimes his militia committed in the CAR."}, {"ch": 6, "q": "The ICC issued arrest warrants against Muammar Gaddafi during the conflict in:", "opts": ["Kenya (2007)", "Cote d'Ivoire (2010)", "Sudan (1993)", "Libya (2011)"], "ans": 3, "exp": "During the 2011 Libyan uprising, the ICC issued warrants against Gaddafi, his son Saif al-Islam, and Abdullah al-Senussi."}, {"ch": 6, "q": "The African Union (AU) was founded in 2002, replacing which earlier organization?", "opts": ["The Organization of African Unity (OAU)", "The League of Nations", "ECOWAS", "The UN Trusteeship Council"], "ans": 0, "exp": "The AU, founded 2002, replaced the OAU, which was founded on 25 May 1963 in Addis Ababa."}, {"ch": 6, "q": "Where is the African Union headquartered?", "opts": ["Addis Ababa, Ethiopia", "Abuja, Nigeria", "Cairo, Egypt", "Nairobi, Kenya"], "ans": 0, "exp": "The AU is headquartered in Addis Ababa, Ethiopia."}, {"ch": 6, "q": "The AU's Continental Early Warning System is abbreviated as:", "opts": ["AMISOM", "ECOWARN", "CEWS", "PSC"], "ans": 2, "exp": "The Continental Early Warning System (CEWS) monitors potential conflicts to alert leaders before violence escalates."}, {"ch": 6, "q": "Which AU peacekeeping mission is specifically mentioned in the text?", "opts": ["MINUSMA", "African Union Mission in Somalia (AMISOM)", "UNAMID", "ECOMOG"], "ans": 1, "exp": "The African Union Mission in Somalia (AMISOM) is cited as an AU peacekeeping deployment."}, {"ch": 6, "q": "The AU's main decision-making organ on peace and security is the:", "opts": ["Peace and Security Council (PSC)", "General Assembly", "ECOSOC", "Trusteeship Council"], "ans": 0, "exp": "The Peace and Security Council (PSC) is the AU's main decision-making organ on peace and security."}, {"ch": 6, "q": "Which countries did the AU's Peace and Security Council suspend after military coups, per the text?", "opts": ["Mali and Guinea", "Kenya and Uganda", "Egypt and Libya", "Nigeria and Ghana"], "ans": 0, "exp": "The PSC suspended countries like Mali and Guinea after military coups."}, {"ch": 6, "q": "ECOWAS was established by the Treaty of Lagos on:", "opts": ["1945", "25 May 1963", "17 July 1998", "28 May 1975"], "ans": 3, "exp": "ECOWAS was established on 28 May 1975 by the Treaty of Lagos."}, {"ch": 6, "q": "How many West African countries make up ECOWAS?", "opts": ["15", "10", "20", "5"], "ans": 0, "exp": "ECOWAS brings together 15 West African countries."}, {"ch": 6, "q": "ECOWAS's military/peacekeeping arm is called:", "opts": ["AMISOM", "ECOMOG", "ECOWARN", "CEWS"], "ans": 1, "exp": "ECOMOG (ECOWAS Monitoring Group) is ECOWAS's military arm deployed to conflict zones."}, {"ch": 6, "q": "ECOMOG played a decisive role in restoring stability in which two countries mentioned in the text?", "opts": ["Kenya and Uganda", "Mali and Niger", "Liberia and Sierra Leone", "Nigeria and Ghana"], "ans": 2, "exp": "ECOMOG intervened in Liberia (1990) and Sierra Leone (1997), playing a decisive role in restoring stability."}, {"ch": 6, "q": "The 1999 peace accord that helped end Sierra Leone's civil war is known as the:", "opts": ["Abuja Accord", "Lome Peace Accord", "Kaiama Declaration", "Rome Statute"], "ans": 1, "exp": "ECOWAS mediated the 1999 Lome Peace Accord in Sierra Leone."}, {"ch": 6, "q": "ECOWAS intervened diplomatically in The Gambia in 2017 after which leader refused to leave office?", "opts": ["Blaise Compaore", "Muammar Gaddafi", "Yahya Jammeh", "Adama Barrow"], "ans": 2, "exp": "ECOWAS intervened when Yahya Jammeh refused to leave office after losing the 2016 election, facilitating a peaceful transition in 2017."}, {"ch": 6, "q": "ECOWAS's Early Warning System is called:", "opts": ["ECOWARN", "AMISOM", "CEWS", "ECOMOG"], "ans": 0, "exp": "ECOWARN is ECOWAS's Early Warning System monitoring political, social, and security developments."}, {"ch": 6, "q": "Which court handles labor and trade union disputes in Nigeria?", "opts": ["The Supreme Court", "The ICJ", "The National Industrial Court of Nigeria (NICN)", "The Federal High Court"], "ans": 2, "exp": "The National Industrial Court of Nigeria (NICN) specializes in resolving labor and trade union disputes."}, {"ch": 6, "q": "Which body investigates human rights abuses and promotes reconciliation in Nigeria?", "opts": ["The ICPC", "The National Human Rights Commission (NHRC)", "The EFCC", "The NDDC"], "ans": 1, "exp": "The National Human Rights Commission (NHRC) investigates abuses and promotes reconciliation."}, {"ch": 6, "q": "Which Act governs land disputes in Nigeria, as cited in the text?", "opts": ["The Labor Act", "The Land Use Act (1978)", "The Electoral Act", "The Petroleum Act"], "ans": 1, "exp": "The Land Use Act (1978) governs land disputes in Nigeria."}, {"ch": 6, "q": "Which Nigerian institution is cited as an example ADR framework alongside the Arbitration and Conciliation Act?", "opts": ["The Lagos Multi-Door Courthouse", "The NDDC", "The National Assembly", "The Federal High Court"], "ans": 0, "exp": "The Lagos Multi-Door Courthouse and the Arbitration and Conciliation Act provide frameworks for peaceful settlements."}, {"ch": 6, "q": "Recent Nigerian legal reforms encourage restorative justice especially in:", "opts": ["Corporate tax law", "Juvenile justice", "Immigration cases", "Constitutional amendments"], "ans": 1, "exp": "Recent reforms encourage restorative justice and community-based approaches especially in juvenile justice."}, {"ch": 6, "q": "Which of the following is NOT listed as a challenge of the Nigerian legal system in conflict resolution?", "opts": ["Corruption and political interference", "Delays in justice delivery", "Excessive judicial independence", "Limited access to justice for rural communities"], "ans": 2, "exp": "Listed challenges are delays, corruption/interference lbert (2001) sees conflict as good — a tool through which desires and goals of groups/persons/states are expressed."}, {"ch": 2, "q": "According to the text, which theory assumes conflicts exist and require intervention, often involving multiple actors?", "opts": ["Communitarian theory", "Peacebuilding theory", "Idealist theory", "Realist theory"], "ans": 1, "exp": "Peacebuilding theory assumes conflicts exist and require intervention, often involving multiple actors rather than a single party."}, {"ch": 2, "q": "Longpoe (2020) emphasizes that peacebuilding should focus on:", "opts": ["Economic sanctions only", "Military solutions exclusively", "Only short-term ceasefires", "Addressing the deeper causes of violence to prevent future conflicts"], "ans": 3, "exp": "Longpoe (2020) emphasizes addressing deeper root causes of violence to prevent future conflicts."}, {"ch": 2, "q": "Adeniyi et al. (2021) describe peacebuilding as both a theory and:", "opts": ["A religious doctrine", "A purely academic exercise", "A practical method that reduces social tension", "A form of punishment"], "ans": 2, "exp": "Adeniyi et al. (2021) describe peacebuilding as both theory and a practical method reducing social tension when applied."}, {"ch": 2, "q": "Maqoma (2020) argues that African societies are deeply communal, emphasizing values such as:", "opts": ["Generosity, compassion, tolerance, and cooperation", "Isolationism", "Individual competition", "Strict hierarchy"], "ans": 0, "exp": "Maqoma (2020) argues African societies emphasize communal values like generosity, compassion, tolerance, and cooperation."}, {"ch": 2, "q": "Which document is cited as reflecting communal values consistent with communitarian theory in Africa?", "opts": ["The African Charter on Human and Peoples' Rights (1981)", "The Treaty of Lagos", "The Rome Statute", "The UN Charter"], "ans": 0, "exp": "The African Charter on Human and Peoples' Rights (1981) reflects communal values consistent with communitarian th const CHAPTER_NAMES = {
  1:"Ch.1 Introduction",
  2:"Ch.2 Theories",
  3:"Ch.3 ADR & Conflict Resolution",
  4:"Ch.4 Peacebuilding & Humanitarian",
  5:"Ch.5 Civil War & Conflicts in Nigeria",
  6:"Ch.6 UN, AU, ECOWAS & Legal System"
};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ---------- Tabs ---------- */
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-'+t.dataset.tab).classList.add('active');
  });
});

/* ---------- CBT Setup ---------- */
let selectedChapters = new Set(Object.keys(CHAPTER_NAMES).map(Number));
let selectedCount = 20;

function renderChapterChips(containerId, targetSet, onChange){
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = '';
  const allChip = document.createElement('div');
  allChip.className = 'chip selected';
  allChip.textContent = 'All Chapters';
  allChip.onclick = ()=>{
    targetSet.clear();
    Object.keys(CHAPTER_NAMES).forEach(c=>targetSet.add(Number(c)));
    onChange();
  };
  wrap.appendChild(allChip);
  Object.entries(CHAPTER_NAMES).forEach(([num,name])=>{
    const chip = document.createElement('div');
    chip.className = 'chip selected';
    chip.textContent = name;
    chip.dataset.ch = num;
    chip.onclick = ()=>{
      const n = Number(num);
      if(targetSet.has(n)){ targetSet.delete(n); } else { targetSet.add(n); }
      onChange();
    };
    wrap.appendChild(chip);
  });
}

function refreshCbtChips(){
  renderChapterChips('chapterChips', selectedChapters, refreshCbtChips);
  const wrap = document.getElementById('chapterChips');
  [...wrap.children].forEach(chip=>{
    if(chip.dataset.ch === undefined){
      chip.classList.toggle('selected', selectedChapters.size === Object.keys(CHAPTER_NAMES).length);
    } else {
      chip.classList.toggle('selected', selectedChapters.has(Number(chip.dataset.ch)));
    }
  });
  updatePoolInfo();
}

function updatePoolInfo(){
  const pool = DATA.filter(q=>selectedChapters.has(q.ch));
  document.getElementById('poolInfo').textContent = pool.length + ' questions available in selection';
}

const counts = [10,20,30,50,100];
function renderCountRow(){
  const row = document.getElementById('countRow');
  row.innerHTML = '';
  counts.forEach(c=>{
    const btn = document.createElement('div');
    btn.className = 'count-btn' + (c===selectedCount ? ' selected':'');
    btn.textContent = c;
    btn.onclick = ()=>{ selectedCount = c; renderCountRow(); };
    row.appendChild(btn);
  });
  const allBtn = document.createElement('div');
  allBtn.className = 'count-btn' + (selectedCount==='all' ? ' selected':'');
  allBtn.textContent = 'All';
  allBtn.onclick = ()=>{ selectedCount='all'; renderCountRow(); };
  row.appendChild(allBtn);
}

refreshCbtChips();
renderCountRow();

/* ---------- CBT Quiz Engine ---------- */
let quizQueue = [];
let quizIndex = 0;
let quizScore = 0;
let answeredCurrent = false;
let chapterStats = {};

document.getElementById('startCbtBtn').addEventListener('click', ()=>{
  let pool = DATA.filter(q=>selectedChapters.has(q.ch));
  pool = shuffle(pool);
  const n = selectedCount==='all' ? pool.length : Math.min(selectedCount, pool.length);
  quizQueue = pool.slice(0,n);
  quizIndex = 0; quizScore = 0; chapterStats = {};
  document.getElementById('cbt-setup').style.display='none';
  document.getElementById('cbt-result').style.display='none';
  document.getElementById('cbt-quiz').style.display='block';
  renderQuestion();
});

function renderQuestion(){
  answeredCurrent = false;
  const q = quizQueue[quizIndex];
  document.getElementById('qCounter').textContent = `Q${quizIndex+1} / ${quizQueue.length}`;
  document.getElementById('qScore').textContent = `Score: ${quizScore}`;
  document.getElementById('progressFill').style.width = ((quizIndex)/quizQueue.length*100)+'%';
  document.getElementById('qChapter').textContent = CHAPTER_NAMES[q.ch].toUpperCase();
  document.getElementById('qText').textContent = q.q;
  const wrap = document.getElementById('optsWrap');
  wrap.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt,i)=>{
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = `<span class="letter">${letters[i]}</span>${opt}`;
    b.onclick = ()=>selectAnswer(i);
    wrap.appendChild(b);
  });
  document.getElementById('explainBox').classList.remove('show');
  document.getElementById('explainBox').textContent = '';
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('skipBtn').disabled = false;
  document.getElementById('skipBtn').style.display = 'block';
}

function selectAnswer(i){
  if(answeredCurrent) return;
  answeredCurrent = true;
  const q = quizQueue[quizIndex];
  const opts = document.querySelectorAll('.opt');
  opts.forEach((el,idx)=>{
    el.classList.add('disabled');
    if(idx === q.ans) el.classList.add('correct');
    else if(idx === i) el.classList.add('wrong');
  });
  chapterStats[q.ch] = chapterStats[q.ch] || {correct:0,total:0};
  chapterStats[q.ch].total++;
  if(i === q.ans){
    quizScore++;
    chapterStats[q.ch].correct++;
  }
  document.getElementById('qScore').textContent = `Score: ${quizScore}`;
  const exp = document.getElementById('explainBox');
  exp.textContent = (i===q.ans ? '✓ Correct. ' : '✗ Incorrect. ') + q.exp;
  exp.classList.add('show');
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('skipBtn').style.display = 'none';
}

document.getElementById('skipBtn').addEventListener('click', ()=>{
  advance();
});
document.getElementById('nextBtn').addEventListener('click', ()=>{
  advance();
});

function advance(){
  quizIndex++;
  if(quizIndex >= quizQueue.length){
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults(){
  document.getElementById('cbt-quiz').style.display='none';
  document.getElementById('cbt-result').style.display='block';
  const pct = Math.round((quizScore/quizQueue.length)*100);
  document.getElementById('scoreRing').textContent = pct+'%';
  document.getElementById('scoreSub').textContent = `You got ${quizScore} of ${quizQueue.length} correct`;
  const bd = document.getElementById('chapterBreakdown');
  bd.innerHTML = '';
  Object.entries(chapterStats).forEach(([ch,s])=>{
    const row = document.createElement('div');
    row.className = 'bd-row';
    row.innerHTML = `<span>${CHAPTER_NAMES[ch]}</span><span>${s.correct}/${s.total}</span>`;
    bd.appendChild(row);
  });
}

document.getElementById('retryBtn').addEventListener('click', ()=>{
  document.getElementById('cbt-result').style.display='none';
  document.getElementById('cbt-setup').style.display='block';
});

/* ---------- Flashcards ---------- */
let fcChapters = new Set(Object.keys(CHAPTER_NAMES).map(Number));
renderChapterChips('fcChapterChips', fcChapters, ()=>refreshFcChips());
function refreshFcChips(){
  renderChapterChips('fcChapterChips', fcChapters, refreshFcChips);
  const wrap = document.getElementById('fcChapterChips');
  [...wrap.children].forEach(chip=>{
    if(chip.dataset.ch === undefined){
      chip.classList.toggle('selected', fcChapters.size === Object.keys(CHAPTER_NAMES).length);
    } else {
      chip.classList.toggle('selected', fcChapters.has(Number(chip.dataset.ch)));
    }
  });
}
refreshFcChips();

let fcDeck = [];
let fcIndex = 0;

document.getElementById('startFcBtn').addEventListener('click', ()=>{
  fcDeck = shuffle(DATA.filter(q=>fcChapters.has(q.ch)));
  if(fcDeck.length===0) return;
  fcIndex = 0;
  document.getElementById('fc-area').style.display='block';
  renderCard();
});

function renderCard(){
  const q = fcDeck[fcIndex];
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = `Card ${fcIndex+1} / ${fcDeck.length}`;
  document.getElementById('fcTagFront').textContent = CHAPTER_NAMES[q.ch].toUpperCase();
  document.getElementById('fcQFront').textContent = q.q;
  document.getElementById('fcAback').textContent = q.opts[q.ans];
  document.getElementById('fcExpBack').textContent = q.exp;
}

document.getElementById('flashcard').addEventListener('click', ()=>{
  document.getElementById('flashcard').classList.toggle('flipped');
});
document.getElementById('fcNextBtn').addEventListener('click', ()=>{
  fcIndex = (fcIndex+1) % fcDeck.length;
  renderCard();
});
document.getElementById('fcPrevBtn').addEventListener('click', ()=>{
  fcIndex = (fcIndex-1+fcDeck.length) % fcDeck.length;
  renderCard();
});
</script>
